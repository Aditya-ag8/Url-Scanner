<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeLink Scanner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .header {
      background: white;
      padding: 20px;
      text-align: center;
      border-bottom: 3px solid #667eea;
    }

    .header h1 {
      font-size: 24px;
      color: #667eea;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      color: #666;
    }

    .container {
      padding: 20px;
    }

    .status-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .status-safe {
      border-left: 4px solid #00AA00;
    }

    .status-warning {
      border-left: 4px solid #FFA500;
    }

    .status-danger {
      border-left: 4px solid #FF0000;
    }

    .status-icon {
      font-size: 48px;
      text-align: center;
      margin-bottom: 15px;
    }

    .status-text {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .url-display {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      word-break: break-all;
      margin-bottom: 15px;
      color: #666;
    }

    .scan-results {
      margin-top: 15px;
    }

    .scan-item {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .scan-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .scan-item-title {
      font-weight: bold;
      font-size: 14px;
      color: #333;
    }

    .scan-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
    }

    .badge-safe {
      background: #d4edda;
      color: #155724;
    }

    .badge-danger {
      background: #f8d7da;
      color: #721c24;
    }

    .badge-warning {
      background: #fff3cd;
      color: #856404;
    }

    .scan-item-details {
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }

    .warnings-list {
      list-style: none;
      margin-top: 10px;
    }

    .warnings-list li {
      padding: 8px;
      background: #fff3cd;
      border-left: 3px solid #ffc107;
      margin-bottom: 5px;
      border-radius: 4px;
      font-size: 12px;
    }

    .button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .button-primary {
      background: #667eea;
      color: white;
    }

    .button-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: white;
    }

    .loading-spinner {
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      background: white;
      padding: 15px;
      text-align: center;
      font-size: 11px;
      color: #999;
      border-top: 1px solid #eee;
    }

    .config-warning {
      background: #fff3cd;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      border-left: 4px solid #ffc107;
    }

    .config-warning-title {
      font-weight: bold;
      margin-bottom: 5px;
      color: #856404;
    }

    .config-warning-text {
      font-size: 12px;
      color: #856404;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛡️ SafeLink Scanner</h1>
    <p>Real-time URL Security Check</p>
  </div>

  <div id="content">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Scanning current page...</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
